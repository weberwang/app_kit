name: Release

# 推送 v* 格式的 tag 时触发（例如 v1.0.0）
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─── Windows 构建 ───────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package into ZIP
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $outDir = "build\windows\x64\runner\Release"
          $zipName = "app_kit-windows-${version}.zip"
          Compress-Archive -Path "$outDir\*" -DestinationPath $zipName
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.ZIP_NAME }}
          retention-days: 5

  # ─── macOS 构建 ─────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release

      - name: Package into ZIP
        run: |
          VERSION="${{ github.ref_name }}"
          APP_PATH="build/macos/Build/Products/Release/app_kit.app"
          ZIP_NAME="app_kit-macos-${VERSION}.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$ZIP_NAME"
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ${{ env.ZIP_NAME }}
          retention-days: 5

  # ─── 创建 Release（两个平台构建完成后）────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ -f CHANGELOG.md ]; then
            body=$(awk "/^## \[?${version#v}/ {found=1; next} found && /^## / {exit} found {print}" CHANGELOG.md)
          fi
          if [ -z "$body" ]; then
            body="Release ${version}"
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
