name: Release

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

# 推送 v* 格式的 tag 时触发（例如 v1.0.0）
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  # ─── Windows 构建 ───────────────────────────────────────────────────────
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build Windows release
        run: flutter build windows --release

      - name: Create MSIX installer
        shell: pwsh
        run: |
          dart pub global activate flutter_distributor
          dart run msix:create --build-windows false
          $version = "${{ github.ref_name }}"
          $msixPath = Get-ChildItem -Path "build\windows\x64\runner\Release\*.msix" | Select-Object -First 1
          $newName = "app_kit-windows-${version}.msix"
          Copy-Item $msixPath.FullName -Destination $newName
          echo "MSIX_NAME=$newName" >> $env:GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: ${{ env.MSIX_NAME }}
          retention-days: 5

  # ─── macOS 构建 ─────────────────────────────────────────────────────────
  build-macos:
    name: Build macOS
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.35.5'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build macOS release
        run: flutter build macos --release

      - name: Create DMG installer
        run: |
          VERSION="${{ github.ref_name }}"
          APP_PATH="build/macos/Build/Products/Release/app_kit.app"
          DMG_NAME="app_kit-macos-${VERSION}.dmg"
          # 创建临时目录并复制 app
          mkdir -p dmg_temp
          cp -R "$APP_PATH" dmg_temp/
          ln -s /Applications dmg_temp/Applications
          # 创建 DMG
          hdiutil create -volname "App Kit" -srcfolder dmg_temp -ov -format UDZO "$DMG_NAME"
          rm -rf dmg_temp
          echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-release
          path: ${{ env.DMG_NAME }}
          retention-days: 5

  # ─── 创建 Release（两个平台构建完成后）────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-windows, build-macos]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: dist/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-release
          path: dist/

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          version="${{ github.ref_name }}"
          if [ -f CHANGELOG.md ]; then
            body=$(awk "/^## \[?${version#v}/ {found=1; next} found && /^## / {exit} found {print}" CHANGELOG.md)
          fi
          if [ -z "$body" ]; then
            body="Release ${version}"
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
